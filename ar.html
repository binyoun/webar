<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>AR Viewer</title>
  <link rel="icon" type="image/png" href="/webar/favicon.png"/>

  <!-- A-Frame + MindAR image tracking (versions tested together) -->
  <script src="https://cdn.jsdelivr.net/npm/aframe@1.5.0/dist/aframe-v1.5.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #0b0b0b;
      --ink: #eaeaea;
      --dim: #8f8f8f;
      --accent: #c1440e;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: var(--bg); color: var(--ink); font-family: 'Space Grotesk', sans-serif; overflow: hidden; }

    #scene-mount, #scene-mount a-scene { position: fixed; inset: 0; width: 100vw; height: 100vh; }

    .mono { font-family: 'JetBrains Mono', monospace; font-size: .72rem; letter-spacing: .12em; text-transform: uppercase; }
    .dim { color: var(--dim); }

    /* HUD info bar */
    #hud {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 10;
      padding: .9rem 1.1rem calc(.9rem + env(safe-area-inset-bottom));
      background: linear-gradient(to top, rgba(11,11,11,.92), rgba(11,11,11,0));
      pointer-events: none;
      transition: opacity .4s;
    }
    #hud .status { color: var(--accent); }
    #hud.found .status::after { content: " \u00b7 target locked"; }
    #work-title { font-size: 1.05rem; font-weight: 600; margin-top: .25rem; }
    #work-meta { font-family: 'JetBrains Mono', monospace; font-size: .7rem; color: var(--dim); margin-top: .15rem; letter-spacing: .1em; }
    #work-caption { font-size: .82rem; color: var(--dim); margin-top: .45rem; max-width: 46ch; line-height: 1.5; }

    a.back {
      position: fixed; top: calc(.8rem + env(safe-area-inset-top)); left: .9rem; z-index: 10;
      color: var(--ink); text-decoration: none;
      font-family: 'JetBrains Mono', monospace; font-size: .7rem; letter-spacing: .12em; text-transform: uppercase;
      border: 1px solid rgba(234,234,234,.25); padding: .35rem .6rem; background: rgba(11,11,11,.55);
    }


    #lens-label { display:none; font-family:'JetBrains Mono',monospace; font-size:.68rem; letter-spacing:.12em; text-transform:uppercase; color:var(--accent); margin-top:.35rem; }
    #hud.pulse { background: linear-gradient(to top, rgba(193,68,14,.28), rgba(11,11,11,0)); }
    button.ghost { font-family:'JetBrains Mono',monospace; font-size:.7rem; letter-spacing:.12em; text-transform:uppercase; padding:.5rem .9rem; border:1px solid rgba(234,234,234,.3); background:rgba(11,11,11,.55); color:var(--ink); cursor:pointer; }
    button.ghost:focus-visible { outline:2px solid var(--ink); outline-offset:2px; }
    button.chip { position:fixed; top:calc(.8rem + env(safe-area-inset-top)); right:.9rem; z-index:10; border-color:var(--accent); color:var(--accent); }
    #dial { font-size:3rem; color:var(--accent); transition:transform .15s linear; }
    .fallback {
      min-height: 100vh; display: flex; flex-direction: column; gap: 1.2rem;
      align-items: center; justify-content: center; padding: 2rem; text-align: center;
    }
    .fallback .mono { color: var(--accent); }
  </style>
</head>
<body>
  <a class="back" href="index.html">&larr; gallery</a>

  <div id="scene-mount"></div>

  <div id="hud">
    <div class="mono status">scanning</div>
    <div id="work-title"></div>
    <div id="work-meta"></div>
    <div id="work-caption"></div>
    <div id="lens-label"></div>
  </div>

  <script src="js/ar-app.js"></script>
</body>
</html>
